# Configurações do site
title: Pedro Mesquita — Full Stack Developer & IA
description: Pedro Mesquita — Desenvolvedor Full Stack e Head de Tecnologia. IA, automação, visão computacional e soluções digitais para diversas indústrias.

url: "" # URL do seu site
baseurl: "/" # Base URL do seu site (deixe como "/" se estiver na raiz do domínio)
github_username: pepemesquita
# Configurações do tema
theme: meu-tema # Nome do diretório do seu tema Jekyll (se aplicável)

# Páginas de projeto (case / como foi feito)
collections:
  portfolio:
    output: true
    permalink: /project/:name/

# Configurações do blog
permalink: /blog/:title # Estrutura de URL para os posts do blog
paginate: 5 # Número de posts por página na listagem do blog

defaults:
  - scope:
      path: ""
      type: portfolio
    values:
      layout: portfolio-item

# Configurações do Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Outras configurações
plugins:
  - jekyll
  # Outros plugins que você possa querer usar
